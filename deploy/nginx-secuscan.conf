# /etc/nginx/sites-available/secuscan
# Vhost secuscan-app.heiphaistos.org → backend axum 127.0.0.1:3005

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name secuscan-app.heiphaistos.org;

    return 301 https://$host$request_uri;
}

# HTTPS avec TLS Let's Encrypt
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name secuscan-app.heiphaistos.org;

    ssl_certificate     /etc/letsencrypt/live/secuscan-app.heiphaistos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secuscan-app.heiphaistos.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # En-têtes de sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Taille max upload (le backend limite à 80 MB, marge ici)
    client_max_body_size 90m;

    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 210s;
        proxy_send_timeout 210s;
    }
}
